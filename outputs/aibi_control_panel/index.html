<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AIBI Control</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101214;
      --panel: #191d20;
      --panel-2: #20262a;
      --text: #eef4f2;
      --muted: #91a09a;
      --line: #30383d;
      --green: #55d67a;
      --blue: #59b8ff;
      --amber: #f1bb52;
      --red: #ff6b6b;
      --shadow: 0 18px 48px rgba(0, 0, 0, 0.32);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .app {
      width: min(1120px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .face {
      width: 58px;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #050607;
      position: relative;
      flex: 0 0 auto;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
    }

    .face::before,
    .face::after {
      content: "";
      position: absolute;
      top: 11px;
      width: 9px;
      height: 16px;
      border-radius: 8px;
      background: var(--green);
      box-shadow: 0 0 12px rgba(85, 214, 122, 0.6);
      animation: idleBlink 4.4s infinite;
    }

    .face::before {
      left: 16px;
    }

    .face::after {
      right: 16px;
    }

    @keyframes idleBlink {
      0%, 92%, 100% { transform: scaleY(1); }
      94%, 96% { transform: scaleY(0.18); }
    }

    h1 {
      font-size: 24px;
      line-height: 1.1;
      margin: 0 0 4px;
      font-weight: 760;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      min-height: 36px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      white-space: nowrap;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 12px rgba(255, 107, 107, 0.6);
    }

    .status.connected .dot {
      background: var(--green);
      box-shadow: 0 0 12px rgba(85, 214, 122, 0.7);
    }

    .grid {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 18px;
      align-items: start;
    }

    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .section-head {
      min-height: 52px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h2 {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
    }

    .body {
      padding: 16px;
    }

    .connect-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 16px;
    }

    .btn {
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--text);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
      user-select: none;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: #4b5960;
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn:disabled {
      cursor: not-allowed;
      opacity: 0.45;
      transform: none;
    }

    .btn.primary {
      background: #123420;
      border-color: rgba(85, 214, 122, 0.55);
    }

    .btn.blue {
      background: #13283a;
      border-color: rgba(89, 184, 255, 0.5);
    }

    .btn.amber {
      background: #332713;
      border-color: rgba(241, 187, 82, 0.55);
    }

    .btn.red {
      background: #351a1d;
      border-color: rgba(255, 107, 107, 0.5);
    }

    .icon {
      width: 18px;
      height: 18px;
      display: inline-block;
      position: relative;
      flex: 0 0 auto;
    }

    .icon.power::before {
      content: "";
      position: absolute;
      inset: 2px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
    }

    .icon.power::after {
      content: "";
      position: absolute;
      left: 8px;
      top: 1px;
      width: 2px;
      height: 9px;
      background: currentColor;
      border-radius: 2px;
    }

    .icon.smile::before {
      content: "";
      position: absolute;
      left: 2px;
      top: 3px;
      width: 14px;
      height: 14px;
      border: 2px solid currentColor;
      border-radius: 50%;
    }

    .icon.smile::after {
      content: "";
      position: absolute;
      left: 5px;
      top: 8px;
      width: 8px;
      height: 5px;
      border-bottom: 2px solid currentColor;
      border-radius: 0 0 10px 10px;
    }

    .icon.talk::before {
      content: "";
      position: absolute;
      left: 2px;
      top: 3px;
      width: 14px;
      height: 10px;
      border: 2px solid currentColor;
      border-radius: 7px;
    }

    .icon.talk::after {
      content: "";
      position: absolute;
      left: 5px;
      top: 12px;
      width: 6px;
      height: 6px;
      border-left: 2px solid currentColor;
      border-bottom: 2px solid currentColor;
      transform: skew(-22deg);
    }

    .icon.sleep::before {
      content: "Z";
      position: absolute;
      left: 4px;
      top: -1px;
      font-weight: 800;
      font-size: 18px;
    }

    .icon.wake::before {
      content: "";
      position: absolute;
      left: 7px;
      top: 2px;
      width: 4px;
      height: 14px;
      background: currentColor;
      border-radius: 4px;
    }

    .icon.wake::after {
      content: "";
      position: absolute;
      left: 2px;
      top: 7px;
      width: 14px;
      height: 4px;
      background: currentColor;
      border-radius: 4px;
    }

    .say-box {
      display: grid;
      gap: 10px;
    }

    textarea {
      width: 100%;
      min-height: 118px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0c0f11;
      color: var(--text);
      padding: 12px;
      outline: none;
    }

    textarea:focus,
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(89, 184, 255, 0.14);
    }

    .say-controls {
      display: grid;
      grid-template-columns: 1fr 150px;
      gap: 10px;
    }

    input {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0c0f11;
      color: var(--text);
      padding: 0 12px;
      outline: none;
    }

    .log {
      height: 318px;
      overflow: auto;
      background: #090b0c;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      font-family: Consolas, Menlo, Monaco, monospace;
      font-size: 13px;
      line-height: 1.45;
      color: #c7d3ce;
      white-space: pre-wrap;
    }

    .log-line {
      display: block;
      margin-bottom: 3px;
    }

    .muted {
      color: var(--muted);
    }

    .sent {
      color: var(--blue);
    }

    .recv {
      color: var(--green);
    }

    .error {
      color: var(--red);
    }

    @media (max-width: 820px) {
      .app {
        width: min(100vw - 20px, 620px);
        padding: 16px 0;
      }

      header {
        align-items: flex-start;
        flex-direction: column;
      }

      .grid,
      .connect-row,
      .say-controls {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 440px) {
      .actions {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 21px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div class="brand">
        <div class="face" aria-hidden="true"></div>
        <div>
          <h1>AIBI Control</h1>
          <p class="subtitle">ESP32 companion face controller</p>
        </div>
      </div>
      <div class="status" id="status">
        <span class="dot"></span>
        <span id="statusText">Disconnected</span>
        <div class="status" style="margin-left: 10px;">
          <span>Mood: <strong id="liveMood">Neutral</strong></span>
        </div>
        <div class="status" style="margin-left: 10px;">
          <span>Uptime: <strong id="liveUptime">0s</strong></span>
        </div>
      </div>
    </header>

    <div class="grid">
      <section>
        <div class="section-head">
          <h2>Controls</h2>
        </div>
        <div class="body">
          <div class="connect-row">
            <button class="btn primary" id="connectBtn" type="button">
              <span class="icon power" aria-hidden="true"></span>
              Connect
            </button>
            <button class="btn red" id="disconnectBtn" type="button" disabled>
              <span class="icon power" aria-hidden="true"></span>
              Disconnect
            </button>
          </div>

          <div class="actions">
            <button class="btn primary command" data-command="HAPPY 2500" type="button" disabled>
              <span class="icon smile" aria-hidden="true"></span>
              Happy
            </button>
            <button class="btn blue command" data-command="TALK 4000" type="button" disabled>
              <span class="icon talk" aria-hidden="true"></span>
              Talk
            </button>
            <button class="btn amber command" data-command="SLEEP 3000" type="button" disabled>
              <span class="icon sleep" aria-hidden="true"></span>
              Sleepy
            </button>
            <button class="btn command" data-command="WAKE 1600" type="button" disabled>
              <span class="icon wake" aria-hidden="true"></span>
              Wake
            </button>
            <button class="btn primary command" data-command="PAT 1800" type="button" disabled>
              <span class="icon smile" aria-hidden="true"></span>
              Pat
            </button>
            <button class="btn command" data-command="CALL 2200" type="button" disabled>
              <span class="icon wake" aria-hidden="true"></span>
              Call
            </button>
          </div>
        </div>
      </section>

      <section>
        <div class="section-head">
          <h2>Say</h2>
        </div>
        <div class="body say-box">
          <textarea id="messageInput" placeholder="Type something for AIBI to perform"></textarea>
          <div class="say-controls">
            <button class="btn blue" id="sayBtn" type="button" disabled>
              <span class="icon talk" aria-hidden="true"></span>
              Say
            </button>
            <input id="durationInput" type="number" min="500" max="12000" step="100" value="2600" aria-label="Duration in milliseconds">
          </div>
        </div>
      </section>

      <section>
        <div class="section-head">
          <h2>Serial Log</h2>
          <button class="btn" id="clearBtn" type="button">Clear</button>
        </div>
        <div class="body">
          <div class="log" id="log" aria-live="polite"></div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const statusEl = document.getElementById("status");
    const statusText = document.getElementById("statusText");
    const connectBtn = document.getElementById("connectBtn");
    const disconnectBtn = document.getElementById("disconnectBtn");
    const commandBtns = [...document.querySelectorAll(".command")];
    const sayBtn = document.getElementById("sayBtn");
    const clearBtn = document.getElementById("clearBtn");
    const logEl = document.getElementById("log");
    const messageInput = document.getElementById("messageInput");
    const durationInput = document.getElementById("durationInput");

    let port;
    let reader;
    let writer;
    let readBuffer = "";

    function addLog(text, type = "muted") {
      const line = document.createElement("span");
      line.className = `log-line ${type}`;
      line.textContent = text;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function setConnected(connected) {
      statusEl.classList.toggle("connected", connected);
      statusText.textContent = connected ? "Connected" : "Disconnected";
      connectBtn.disabled = connected;
      disconnectBtn.disabled = !connected;
      commandBtns.forEach((button) => button.disabled = !connected);
      sayBtn.disabled = !connected;
    }

    async function readLoop() {
      const decoder = new TextDecoder();
      reader = port.readable.getReader();

      try {
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          readBuffer += decoder.decode(value);

          const lines = readBuffer.split(/\r?\n/);
          readBuffer = lines.pop() || "";

          for (const line of lines) {
            if (line.trim()) addLog(`< ${line}`, "recv");
          }
        }
      } catch (error) {
        addLog(`read error: ${error.message}`, "error");
      } finally {
        reader.releaseLock();
        reader = undefined;
      }
    }

    async function connect() {
      if (!("serial" in navigator)) {
        addLog("Web Serial is not available in this browser", "error");
        return;
      }

      try {
        port = await navigator.serial.requestPort();
        await port.open({ baudRate: 115200 });
        writer = port.writable.getWriter();
        setConnected(true);
        addLog("connected at 115200", "recv");
        readLoop();
      } catch (error) {
        addLog(`connect error: ${error.message}`, "error");
      }
    }

    async function disconnect() {
      try {
        if (reader) await reader.cancel();
        if (writer) {
          writer.releaseLock();
          writer = undefined;
        }
        if (port) {
          await port.close();
          port = undefined;
        }
      } catch (error) {
        addLog(`disconnect error: ${error.message}`, "error");
      } finally {
        setConnected(false);
        addLog("disconnected", "muted");
      }
    }

    async function sendCommand(command) {
      if (!writer) {
        addLog("not connected", "error");
        return;
      }

      const encoder = new TextEncoder();
      await writer.write(encoder.encode(`${command}\n`));
      addLog(`> ${command}`, "sent");
    }

    function estimateDuration(text) {
      const trimmed = text.trim();
      if (!trimmed) return Number(durationInput.value) || 2600;
      return Math.min(12000, Math.max(1200, 800 + trimmed.length * 75));
    }

    connectBtn.addEventListener("click", connect);
    disconnectBtn.addEventListener("click", disconnect);
    clearBtn.addEventListener("click", () => logEl.textContent = "");

    commandBtns.forEach((button) => {
      button.addEventListener("click", () => sendCommand(button.dataset.command));
    });

    sayBtn.addEventListener("click", () => {
      const duration = estimateDuration(messageInput.value);
      durationInput.value = duration;
      sendCommand(`TALK ${duration}`);
    });

    messageInput.addEventListener("input", () => {
      durationInput.value = estimateDuration(messageInput.value);
    });

    setConnected(false);
    addLog("ready");
    // --- LIVE TELEMETRY POLLING ENGINE ---
// This loops every 2 seconds to read AIBI's state over Wi-Fi
setInterval(async () => {
  // Only try to fetch if your laptop is connected to AIBI's Wi-Fi network
  try {
    const response = await fetch('http://192.168.4.1/state');
    if (response.ok) {
      const data = await response.json();
      
      // Update our new HTML elements with live data from the ESP32
      document.getElementById('liveMood').textContent = data.mood;
      document.getElementById('liveMood').style.color = '#55d67a';
      document.getElementById('liveUptime').textContent = data.uptime_seconds + 's';
    }
  } catch (error) {
    // If you are only connected via USB and not Wi-Fi, this fails silently
    document.getElementById('liveMood').textContent = 'Unknown (No Wi-Fi)';
    document.getElementById('liveMood').style.color = var(--muted);
  }
}, 2000);
  </script>
</body>
</html>
